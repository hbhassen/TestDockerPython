# Ce fichier est genere par l archetype entreprise.
# Relisez-le en priorite apres la creation du projet : identite de l application,
# datasource, identifiants et reglages operationnels sont les premiers points a adapter.

server:
  # Changez ce port seulement si le service doit tourner dans un contexte local particulier.
  port: 8080

spring:
  application:
    # Le nom Spring de l application est reutilise par les logs, l observabilite et les outils.
    name: enterprise-app-h2
  main:
    # Le projet genere utilise la pile servlet basee sur Spring MVC.
    web-application-type: servlet

  datasource:
    # Configuration H2 generee a partir du databaseType choisi lors de la creation du projet.
    # Adaptee au developpement local et aux demos rapides. Remplacez-la par une
    # configuration de base partagee lorsque le service sort du cadre local.
    url: jdbc:h2:mem:enterprise_h2;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # Gardee simple volontairement. Pour un vrai systeme de production, preferez Flyway ou Liquibase.
      ddl-auto: update
    # Desactive Open Session in View pour garder des frontieres de transaction explicites dans la couche service.
    open-in-view: false
    properties:
      hibernate:
        # Le schema est derive du fichier d entree de l archetype ou des parametres de ligne de commande.
        default_schema: app_schema
        format_sql: true

  sql:
    init:
      # schema.sql cree le schema configure avant qu Hibernate ne gere les tables.
      mode: always
      schema-locations: classpath:schema.sql

management:
  endpoints:
    web:
      exposure:
        # Gardez la surface publique minimale par defaut.
        include: health,info
  endpoint:
    health:
      show-details: never

info:
  app:
    # Ces metadonnees peuvent etre exposees sans risque et sont reutilisees par actuator info.
    name: enterprise-app-h2
    version: '@project.version@'
    description: Generated by enterprise archetype

application:
  metadata:
    # Ce bloc est la source de verite du endpoint d exemple /api/application/version.
    name: enterprise-app-h2
    version: '@project.version@'
    description: Generated by enterprise archetype

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
