# Les tests generes s executent toujours sur H2 afin de rester deterministes et
# de ne pas dependre d un serveur PostgreSQL externe en CI ou en developpement local.

spring:
  application:
    name: test-application
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        default_schema: PUBLIC
  sql:
    init:
      mode: never

application:
  metadata:
    # Ces valeurs sont reservees aux tests et gardent les tests generes independants
    # du filtrage des ressources Maven ou d une configuration d execution externe.
    name: test-application
    version: test-version
    description: Generated by enterprise archetype
